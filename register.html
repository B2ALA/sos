<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MediHelp - Register</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="top-nav">
    <a href="index.html">🚨 SOS</a>
    <a href="chatbot.html">🤖 Chatbot</a>
    <a href="finder.html">📍 Finder</a>
    <a href="register.html" class="active">📝 Register</a>
    <a href="login.html">🔑 Login</a>
  </nav>

  <div class="container">
    <header class="app-header">
      <h1>📝 Create Your MediHelp Profile</h1>
      <p>This info is used to speed up emergency response for you</p>
    </header>

    <form id="registerForm">
      <div class="form-section">
        <h3>Personal Details</h3>
        <div class="field"><label>Full Name *</label><input type="text" id="fullName" required /></div>
        <div class="row-2">
          <div class="field"><label>Age</label><input type="number" id="age" min="0" /></div>
          <div class="field"><label>Gender</label>
            <select id="gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select>
          </div>
        </div>
        <div class="row-2">
          <div class="field"><label>Date of Birth</label><input type="date" id="dob" /></div>
          <div class="field"><label>Blood Group</label>
            <select id="bloodGroup">
              <option value="">Select</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
              <option>O+</option><option>O-</option>
            </select>
          </div>
        </div>
        <div class="row-2">
          <div class="field"><label>Height (cm)</label><input type="number" id="height" /></div>
          <div class="field"><label>Weight (kg)</label><input type="number" id="weight" /></div>
        </div>
        <div class="field"><label>Address</label><textarea id="address"></textarea></div>
        <div class="row-2">
          <div class="field"><label>District</label><input type="text" id="district" /></div>
          <div class="field"><label>State</label><input type="text" id="state" /></div>
        </div>
        <div class="row-2">
          <div class="field"><label>Pincode</label><input type="text" id="pincode" /></div>
          <div class="field"><label>Phone Number *</label><input type="tel" id="phone" required /></div>
        </div>
        <div class="field"><label>Email</label><input type="email" id="email" /></div>
      </div>

      <div class="form-section">
        <h3>Emergency Contact</h3>
        <div class="field"><label>Contact Person Name</label><input type="text" id="contactPersonName" /></div>
        <div class="row-2">
          <div class="field"><label>Relationship</label><input type="text" id="relationship" /></div>
          <div class="field"><label>Contact Number</label><input type="tel" id="contactNumber" /></div>
        </div>
      </div>

      <div class="form-section">
        <h3>Medical Information</h3>
        <div class="field"><label>Allergies</label><textarea id="allergies" placeholder="e.g. Penicillin, Peanuts"></textarea></div>
        <div class="field"><label>Existing Diseases</label><textarea id="diseases" placeholder="e.g. Diabetes, Hypertension"></textarea></div>
        <div class="field"><label>Current Medications</label><textarea id="currentMedications"></textarea></div>
        <div class="field"><label>Disabilities</label><input type="text" id="disabilities" /></div>
        <div class="field"><label>Insurance Details</label><input type="text" id="insuranceDetails" /></div>
      </div>

      <div class="form-section">
        <h3>Account Details</h3>
        <div class="field"><label>Username *</label><input type="text" id="username" required /></div>
        <div class="field"><label>Password *</label><input type="password" id="password" required minlength="6" /></div>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
      <div id="formMsg"></div>
    </form>
  </div>

  <script src="register.js"></script>
</body>
</html>
