<!doctype html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Register — MediHelp</title><link rel="stylesheet" href="css/styles.css" /></head>
<body>
  <section class="section" style="max-width:720px;margin:24px auto">
    <div style="background:var(--surface);padding:18px;border-radius:12px;box-shadow:var(--shadow)">
      <h2>Create Account</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input id="r_fullname" class="m-input" placeholder="Full Name" />
        <input id="r_age" class="m-input" placeholder="Age" />
        <input id="r_gender" class="m-input" placeholder="Gender" />
        <input id="r_dob" type="date" class="m-input" placeholder="DOB" />
        <input id="r_blood" class="m-input" placeholder="Blood Group" />
        <input id="r_mobile" class="m-input" placeholder="Mobile Number" />
        <input id="r_emergency" class="m-input" placeholder="Emergency Contact" />
        <input id="r_email" class="m-input" placeholder="Email" />
        <input id="r_password" type="password" class="m-input" placeholder="Password" />
      </div>
      <div style="margin-top:8px">
        <textarea id="r_medical" class="m-input" placeholder="Medical conditions, allergies, current medications"></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-full btn-brand" onclick="doRegister()">Register</button>
        <a class="btn-full btn-grey" href="login.html">Back to Login</a>
      </div>
    </div>
  </section>

  <script>
    function doRegister(){
      const user = {
        name: document.getElementById('r_fullname').value,
        age: document.getElementById('r_age').value,
        gender: document.getElementById('r_gender').value,
        dob: document.getElementById('r_dob').value,
        blood: document.getElementById('r_blood').value,
        mobile: document.getElementById('r_mobile').value,
        emergency: document.getElementById('r_emergency').value,
        email: document.getElementById('r_email').value,
        password: document.getElementById('r_password').value,
        medical: document.getElementById('r_medical').value
      };
      const users = JSON.parse(localStorage.getItem('medi_users') || '[]');
      if (users.find(u => u.email === user.email)) { alert('Email exists'); return; }
      users.push(user);
      localStorage.setItem('medi_users', JSON.stringify(users));
      localStorage.setItem('medi_user', JSON.stringify(user));
      alert('Registered');
      window.location.href = 'profile.html';
    }
  </script>
</body>
</html>
