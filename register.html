<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register — MediHelp</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <h2>Create Account</h2>
    <form id="regForm" enctype="multipart/form-data">
      <label> Full Name <input id="fullName" required /></label>
      <label> Age <input id="age" type="number" required /></label>
      <label> Gender <select id="gender"><option>Male</option><option>Female</option><option>Other</option></select></label>
      <label> Date of Birth <input id="dob" type="date" /></label>
      <label> Blood Group <input id="blood" placeholder="A+, O-, etc." /></label>
      <label> Mobile Number <input id="mobile" /></label>
      <label> Emergency Contact <input id="emContact" /></label>
      <label> Address <input id="address" /></label>
      <label> District <input id="district" /></label>
      <label> State <input id="state" /></label>
      <label> Email <input id="email" type="email" required /></label>
      <label> Password <input id="password" type="password" required /></label>
      <label> Medical Conditions <input id="conditions" /></label>
      <label> Allergies <input id="allergies" /></label>
      <label> Current Medications <input id="meds" /></label>
      <label> Insurance Details <input id="insurance" /></label>
      <label> Organ Donor <select id="organ"><option>No</option><option>Yes</option></select></label>
      <label> Profile Picture <input id="profilePic" type="file" accept="image/*" /></label>
      <div class="auth-actions">
        <button type="submit" class="btn primary">Register</button>
        <a href="login.html" class="btn ghost">Login</a>
      </div>
    </form>
    <div id="regMsg" class="muted"></div>
  </main>

  <script>
    // Simple registration storing to localStorage (demo)
    document.getElementById('regForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const users = JSON.parse(localStorage.getItem('mh_users')||'[]');
      const email = document.getElementById('email').value.trim();
      if(users.find(u=>u.email===email)){
        document.getElementById('regMsg').textContent = 'Email already registered.';
        return;
      }
      const reader = new FileReader();
      const file = document.getElementById('profilePic').files[0];
      const user = {
        id: 'u_' + Date.now(),
        name: document.getElementById('fullName').value,
        age: document.getElementById('age').value,
        gender: document.getElementById('gender').value,
        dob: document.getElementById('dob').value,
        blood: document.getElementById('blood').value,
        mobile: document.getElementById('mobile').value,
        emContact: document.getElementById('emContact').value,
        address: document.getElementById('address').value,
        district: document.getElementById('district').value,
        state: document.getElementById('state').value,
        email,
        password: document.getElementById('password').value,
        conditions: document.getElementById('conditions').value,
        allergies: document.getElementById('allergies').value,
        meds: document.getElementById('meds').value,
        insurance: document.getElementById('insurance').value,
        organ: document.getElementById('organ').value,
        createdAt: new Date().toISOString()
      };
      if(file){
        reader.onload = function(ev){
          user.avatar = ev.target.result;
          users.push(user);
          localStorage.setItem('mh_users', JSON.stringify(users));
          localStorage.setItem('mh_current', JSON.stringify(user));
          window.location.href = 'profile.html';
        };
        reader.readAsDataURL(file);
      } else {
        users.push(user);
        localStorage.setItem('mh_users', JSON.stringify(users));
        localStorage.setItem('mh_current', JSON.stringify(user));
        window.location.href = 'profile.html';
      }
    });
  </script>
</body>
</html>
