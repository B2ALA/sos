<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Shelters — MediHelp</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand"><span class="pulse-dot"></span> MediHelp</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="volunteers.html">Volunteers</a></li>
      <li><a href="sos.html" class="nav-cta">SOS</a></li>
    </ul>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"><i class="fa-solid fa-circle-half-stroke"></i></button>
  </div>
</nav>

<section class="section">
  <div class="container">
    <span class="eyebrow">Schools · Colleges · Community Halls</span>
    <h1>Emergency shelters</h1>
    <p>Designated shelter locations for disaster or evacuation situations in Salem.</p>

    <div class="flex gap-12" style="margin:20px 0; flex-wrap:wrap;">
      <button class="btn btn-outline type-filter active" data-type="">All types</button>
      <button class="btn btn-outline type-filter" data-type="School">Schools</button>
      <button class="btn btn-outline type-filter" data-type="College">Colleges</button>
      <button class="btn btn-outline type-filter" data-type="Community Hall">Community Halls</button>
      <button class="btn btn-outline type-filter" data-type="Disaster Shelter">Disaster Shelters</button>
    </div>

    <div class="grid grid-3" id="results"></div>
  </div>
</section>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script>
let allShelters = [];

function renderShelters(list) {
  document.getElementById("results").innerHTML = list.map((s) => `
    <div class="card card-hover">
      <span class="badge">${s.type}</span>
      <h3 style="margin-top:12px; font-size:1.1rem;">${s.name}</h3>
      <p style="margin:0 0 4px;"><i class="fa-solid fa-location-dot"></i> ${s.address}</p>
      <p style="margin:0 0 10px;"><i class="fa-solid fa-users"></i> Capacity: ${s.capacity}</p>
      <a class="btn btn-primary btn-block" href="tel:${s.phone}"><i class="fa-solid fa-phone"></i> Call ${s.phone}</a>
    </div>
  `).join("") || "<p>No shelters found.</p>";
}

async function loadShelters() {
  try {
    const res = await MediHelpAPI.get("/shelters");
    allShelters = res.data;
    renderShelters(allShelters);
  } catch (err) {
    document.getElementById("results").innerHTML = `<p>Couldn't load shelters right now. ${err.message}</p>`;
  }
}

document.querySelectorAll(".type-filter").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".type-filter").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    const type = btn.dataset.type;
    renderShelters(type ? allShelters.filter((s) => s.type === type) : allShelters);
  });
});

loadShelters();
</script>
</body>
</html>
