<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Teams — MediHelp</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand"><span class="pulse-dot"></span> MediHelp</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shelters.html">Shelters</a></li>
      <li><a href="sos.html" class="nav-cta">SOS</a></li>
    </ul>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"><i class="fa-solid fa-circle-half-stroke"></i></button>
  </div>
</nav>

<section class="section">
  <div class="container">
    <span class="eyebrow">Salem's emergency responders</span>
    <h1>Volunteer teams</h1>
    <p>Fire, medical, and rescue groups are dispatched automatically when an SOS is triggered, based on the emergency type.</p>

    <div class="flex gap-12" style="margin:20px 0; flex-wrap:wrap;">
      <button class="btn btn-outline team-filter active" data-team="">All teams</button>
      <button class="btn btn-outline team-filter" data-team="Fire"><i class="fa-solid fa-fire"></i> Fire</button>
      <button class="btn btn-outline team-filter" data-team="Medical"><i class="fa-solid fa-kit-medical"></i> Medical</button>
      <button class="btn btn-outline team-filter" data-team="Rescue"><i class="fa-solid fa-life-ring"></i> Rescue</button>
    </div>

    <div class="grid grid-3" id="results"></div>
  </div>
</section>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script>
function renderVolunteers(list) {
  document.getElementById("results").innerHTML = list.map((v) => `
    <div class="card card-hover">
      <span class="badge">${v.team || v.volunteer_groups?.team_type || ""}</span>
      <h3 style="margin-top:12px; font-size:1.1rem;">${v.name}</h3>
      <p style="margin:0 0 4px;"><i class="fa-solid fa-screwdriver-wrench"></i> ${v.skills}</p>
      <p style="margin:0 0 4px;"><i class="fa-solid fa-location-dot"></i> ${v.location}</p>
      <span class="badge ${v.availability === 'available' ? '' : 'badge-alert'}">${v.availability}</span>
    </div>
  `).join("") || "<p>No volunteers found for this team.</p>";
}

async function loadVolunteers(team = "") {
  try {
    const path = team ? `/volunteers/by-team/${team}` : "/volunteers";
    const res = await MediHelpAPI.get(path);
    renderVolunteers(res.data);
  } catch (err) {
    document.getElementById("results").innerHTML = `<p>Couldn't load volunteers right now. ${err.message}</p>`;
  }
}

document.querySelectorAll(".team-filter").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".team-filter").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    loadVolunteers(btn.dataset.team);
  });
});

loadVolunteers();
</script>
</body>
</html>
