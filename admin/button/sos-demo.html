<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MediHelp SOS Module — Standalone Demo</title>
<link rel="stylesheet" href="sos-module.css"/>
<style>
  body{font-family:Inter,-apple-system,sans-serif;background:#F9FAFB;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}
  .demo-card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 12px rgba(16,24,40,.08);text-align:center;max-width:360px;}
  .demo-card h1{font-size:18px;margin-bottom:8px;}
  .demo-card p{font-size:13px;color:#667085;margin-bottom:20px;line-height:1.6;}
  .demo-btn{background:linear-gradient(135deg,#D92D20,#B42318);color:#fff;border:none;border-radius:12px;
    padding:14px 24px;font-size:14px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
  <div class="demo-card">
    <h1>🆘 SOS Module — Test Harness</h1>
    <p>This page is only for testing the module in isolation. It is <strong>not</strong> a replacement
       for the real MediHelp <code>index.html</code> — the real site keeps its own SOS button and simply
       loads these same three files (see docs/INTEGRATION_GUIDE.md).</p>
    <button class="demo-btn" onclick="MediHelpSOS.open()">🆘 Trigger SOS</button>
  </div>

  <div id="toast" class="toast"></div>

  <!-- 1. Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 2. Your existing supabase client (this is a copy for the demo to run standalone) -->
  <script src="../shared/supabase-client.js"></script>
  <!-- 3. The SOS module itself -->
  <script src="sos-module.js"></script>
</body>
</html>
