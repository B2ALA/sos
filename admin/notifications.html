<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications · MediHelp Admin BY TS GROUPS </title>
<link rel="stylesheet" href="dashboard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="notifications.css">
</head>
<body>

<div class="mh-shell">
  <div id="mh-sidebar"></div>
  <div class="mh-main">
    <div id="mh-navbar"></div>
    <div class="mh-content">

      <div class="mh-toolbar">
        <h2>Notifications</h2>
        <button class="mh-btn mh-btn-primary" id="mh-add-btn">+ Compose</button>
      </div>

      <div class="mh-table-wrap">
        <table class="mh-table">
          <thead>
            <tr><th>Title</th><th>Type</th><th>Target</th><th>Sent</th><th></th></tr>
          </thead>
          <tbody id="mh-table-body">
            <tr><td colspan="5" class="mh-empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
    <div id="mh-footer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="common.js"></script>
<script src="sidebar.js"></script>
<script src="navbar.js"></script>
<script src="footer.js"></script>
<script src="notifications.js"></script>
</body>
</html>
