<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SOS / Emergency — MediHelp Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --navy-950:#0B1220; --navy-900:#0F1B2E; --navy-800:#142A45;
  --brand:#0E7C66; --brand-dark:#0A5C4C; --brand-light:#12A187; --brand-tint:#E8F7F2;
  --red:#D92D20; --red-dark:#B42318; --red-tint:#FEF3F2;
  --amber:#F79009; --amber-dark:#B54708; --amber-tint:#FFFAEB;
  --blue:#1570EF; --blue-dark:#175CD3; --blue-tint:#EFF8FF;
  --orange:#EF6C00; --orange-dark:#9C2A10;
  --purple:#6941C6; --purple-tint:#F4EBFF;
  --ink:#101828; --ink-2:#344054; --ink-3:#667085; --ink-4:#98A2B3;
  --line:#E4E7EC; --line-2:#EAECF0; --surface:#FFFFFF; --bg:#F9FAFB;
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);}

.layout{display:grid;grid-template-columns:280px 1fr 340px;height:100vh;}
@media(max-width:1100px){.layout{grid-template-columns:1fr;height:auto;}}

/* ── sidebar (mirrors your existing admin nav look) ── */
.sidebar{background:var(--navy-950);color:#fff;padding:20px 14px;display:flex;flex-direction:column;gap:2px;}
.brand{display:flex;align-items:center;gap:9px;padding:8px 10px 20px;}
.brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand-light),var(--brand-dark));
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.brand .txt{font-family:'Manrope',sans-serif;font-size:14.5px;font-weight:800;line-height:1.25;}
.brand .txt small{display:block;font-size:10.5px;font-weight:500;color:#7A88A6;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:600;
  color:#B7C1D9;cursor:pointer;}
.nav-item.active{background:var(--brand);color:#fff;}

/* ── main map column ── */
.main{position:relative;}
.topbar{position:absolute;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;background:linear-gradient(180deg,rgba(11,18,32,.85),transparent);pointer-events:none;}
.topbar h1{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;color:#fff;pointer-events:auto;}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:11.5px;font-weight:700;
  color:#A6F4C5;pointer-events:auto;}
.dot-live{width:6px;height:6px;border-radius:50%;background:#32D583;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(50,213,131,.5);}50%{box-shadow:0 0 0 5px rgba(50,213,131,0);}}
#map{width:100%;height:100vh;}
@media(max-width:1100px){#map{height:60vh;}}

.legend{position:absolute;bottom:16px;left:16px;z-index:500;background:#fff;border-radius:12px;
  box-shadow:0 4px 16px rgba(16,24,40,.15);padding:12px 14px;display:flex;flex-direction:column;gap:7px;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;color:var(--ink-2);}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}

/* ── right panel: live alert list ── */
.panel{background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
.panel-head{padding:18px 18px 12px;border-bottom:1px solid var(--line-2);}
.panel-head h2{font-family:'Manrope',sans-serif;font-size:15.5px;font-weight:800;}
.panel-head p{font-size:11.5px;color:var(--ink-3);margin-top:2px;}
.alert-list{flex:1;overflow-y:auto;padding:12px;}
.alert-card{border:1.5px solid var(--line-2);border-radius:13px;padding:13px;margin-bottom:10px;cursor:pointer;
  transition:.15s var(--ease);}
.alert-card:hover{border-color:var(--brand-light);box-shadow:0 2px 8px rgba(16,24,40,.08);}
.alert-card.selected{border-color:var(--brand);background:var(--brand-tint);}
.ac-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.ac-type{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:20px;color:#fff;}
.ac-time{margin-left:auto;font-size:10.5px;color:var(--ink-4);font-weight:600;}
.ac-addr{font-size:12.5px;color:var(--ink-2);line-height:1.5;margin-bottom:8px;}
.ac-meta{display:flex;gap:6px;flex-wrap:wrap;}
.ac-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--ink-3);}
.ac-actions{display:flex;gap:6px;margin-top:9px;}
.ac-btn{flex:1;font-size:11px;font-weight:700;padding:6px;border-radius:8px;border:none;cursor:pointer;}
.ac-resolve{background:var(--brand-tint);color:var(--brand-dark);}
.ac-resolve:hover{background:#D9F1E9;}
.empty-state{text-align:center;padding:40px 16px;color:var(--ink-4);font-size:12.5px;}

.pulse-marker{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 6px rgba(0,0,0,.12);font-size:12px;position:relative;}
.pulse-marker::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid currentColor;
  animation:markerPulse 1.6s infinite;opacity:.6;}
@keyframes markerPulse{0%{transform:scale(.6);opacity:.7;}100%{transform:scale(1.6);opacity:0;}}
.leaflet-popup-content{font-family:'Inter',sans-serif;font-size:12.5px;}
.popup-title{font-weight:800;font-size:13px;margin-bottom:3px;}
.popup-addr{color:var(--ink-3);margin-bottom:6px;}
.popup-btn{font-size:11px;font-weight:700;background:var(--brand);color:#fff;border:none;border-radius:7px;padding:5px 10px;cursor:pointer;}
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="mark">⚕️</div><div class="txt">MediHelp<small>Admin</small></div></div>
    <div class="nav-item">📊 Dashboard</div>
    <div class="nav-item">🏥 Hospitals</div>
    <div class="nav-item">🩺 Doctors</div>
    <div class="nav-item">🩸 Blood Banks</div>
    <div class="nav-item">🚑 Ambulances</div>
    <div class="nav-item">🙋 Volunteers</div>
    <div class="nav-item">👥 Users</div>
    <div class="nav-item active">🆘 SOS / Emergency</div>
    <div class="nav-item">🔔 Notifications</div>
    <div class="nav-item">⚙️ Settings</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>SOS / Emergency — Live Map</h1>
      <div class="live-pill"><span class="dot-live"></span> <span id="liveCount">0</span> active</div>
    </div>
    <div id="map"></div>
    <div class="legend">
      <div class="legend-row"><span class="legend-dot" style="background:#D92D20;"></span> Medical</div>
      <div class="legend-row"><span class="legend-dot" style="background:#F79009;"></span> Accident</div>
      <div class="legend-row"><span class="legend-dot" style="background:#EF6C00;"></span> Fire</div>
      <div class="legend-row"><span class="legend-dot" style="background:#1570EF;"></span> Other</div>
      <div class="legend-row"><span class="legend-dot" style="background:#6941C6;"></span> SOS Mode</div>
    </div>
  </main>

  <aside class="panel">
    <div class="panel-head">
      <h2>Active SOS Alerts</h2>
      <p>Updates instantly — no refresh needed</p>
    </div>
    <div class="alert-list" id="alertList">
      <div class="empty-state">Loading…</div>
    </div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- supabase.js (below) calls supabase.createClient(...) but doesn't load the
     SDK itself — your dashboard.html presumably loads this CDN script first.
     This page needs it too, in the same order. Bare package URL — the
     earlier /dist/umd/supabase.js path 404s. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Uses YOUR existing admin session. Reading/resolving sos_alerts requires
     is_admin() = true under RLS, which only an authenticated admin has —
     so this reuses admin/supabase.js's client instead of creating a fresh
     anonymous one. Because both are plain (non-module) <script> tags on the
     same page, this file can reference `supabaseClient` directly — it's the
     same object supabase.js already created. -->
<script src="supabase.js"></script>
<script>
/* ============================================================================
   MediHelp Admin — SOS Live Map
   Uses the SAME supabaseClient your dashboard already created (via
   supabase.js, loaded above) — including its logged-in session. sos_alerts
   is RLS-gated to is_admin(), so this page only works if you're already
   signed in to the admin panel in this browser.

   Table: sos_alerts   Columns: lat, lng, created_at, resolved_at, ...
   (NOT sos_requests / latitude / longitude / raised_at — that was an old
   assumption from before the real schema was shared, and every place it
   leaked through is why the map used to sit at "0 active" forever.)
   ============================================================================ */

// ── colors + labels per emergency type ──
const TYPE_STYLE = {
  medical:  { color:'#D92D20', label:'Medical'  },
  accident: { color:'#F79009', label:'Accident' },
  fire:     { color:'#EF6C00', label:'Fire'      },
  other:    { color:'#1570EF', label:'Other'     },
  sos_mode: { color:'#6941C6', label:'SOS Mode'  },
};
function styleFor(type){ return TYPE_STYLE[type] || TYPE_STYLE.other; }

// ── map init (centered on Salem, Tamil Nadu) ──
const map = L.map('map').setView([11.6643, 78.1460], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

const markers = {};   // id -> Leaflet marker
let alerts = {};      // id -> row data

function markerIcon(type){
  const s = styleFor(type);
  return L.divIcon({
    className: '',
    html: `<div class="pulse-marker" style="background:${s.color};color:${s.color};"></div>`,
    iconSize: [22,22],
    iconAnchor: [11,11]
  });
}

function timeAgo(iso){
  const diff = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime())/1000));
  if(diff < 60) return diff + 's ago';
  if(diff < 3600) return Math.floor(diff/60) + 'm ago';
  return Math.floor(diff/3600) + 'h ago';
}

function locationLabel(row){
  // Reverse-geocoded address if we have one, otherwise raw coordinates.
  return row.address || (row.lat.toFixed(5) + ', ' + row.lng.toFixed(5));
}

function upsertMarker(row){
  const s = styleFor(row.emergency_type);
  if(markers[row.id]){
    markers[row.id].setLatLng([row.lat, row.lng]);
  } else {
    const m = L.marker([row.lat, row.lng], { icon: markerIcon(row.emergency_type) }).addTo(map);
    m.on('click', () => selectAlert(row.id));
    markers[row.id] = m;
  }
  markers[row.id].bindPopup(`
    <div class="popup-title" style="color:${s.color};">${s.label} Emergency</div>
    <div class="popup-addr">${locationLabel(row)}</div>
    <button class="popup-btn" onclick="resolveAlert('${row.id}')">Mark Resolved</button>
  `);
}

function removeMarker(id){
  if(markers[id]){ map.removeLayer(markers[id]); delete markers[id]; }
}

function selectAlert(id){
  document.querySelectorAll('.alert-card').forEach(el => el.classList.remove('selected'));
  const card = document.getElementById('card-' + id);
  if(card){ card.classList.add('selected'); card.scrollIntoView({behavior:'smooth', block:'nearest'}); }
  const row = alerts[id];
  if(row && markers[id]){
    map.setView([row.lat, row.lng], 15, { animate:true });
    markers[id].openPopup();
  }
}

async function resolveAlert(id){
  const { error } = await supabaseClient
    .from('sos_alerts')
    .update({ status: 'resolved', resolved_at: new Date().toISOString() })
    .eq('id', id);
  if(error){ console.error('[MediHelp Admin] Failed to resolve alert —', error.message, error); alert('Could not update status — check console.'); }
  // UI updates itself via the realtime subscription below
}
window.resolveAlert = resolveAlert; // needed for the inline popup button

function renderList(){
  const list = document.getElementById('alertList');
  const rows = Object.values(alerts).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  document.getElementById('liveCount').textContent = rows.length;

  if(!rows.length){
    list.innerHTML = '<div class="empty-state">✅ No active SOS alerts right now.</div>';
    return;
  }

  list.innerHTML = rows.map(row => {
    const s = styleFor(row.emergency_type);
    return `
      <div class="alert-card" id="card-${row.id}" onclick="selectAlert('${row.id}')">
        <div class="ac-top">
          <span class="ac-type" style="background:${s.color};">${s.label}</span>
          <span class="ac-time">${timeAgo(row.created_at)}</span>
        </div>
        <div class="ac-addr">📍 ${locationLabel(row)}</div>
        <div class="ac-meta">
          ${row.user_name ? `<span class="ac-badge">👤 ${row.user_name}</span>` : ''}
          ${row.user_contact ? `<span class="ac-badge">📞 ${row.user_contact}</span>` : ''}
          ${row.accuracy ? `<span class="ac-badge">±${Math.round(row.accuracy)}m</span>` : ''}
        </div>
        <div class="ac-actions">
          <button class="ac-btn ac-resolve" onclick="event.stopPropagation();resolveAlert('${row.id}')">✅ Mark Resolved</button>
        </div>
      </div>`;
  }).join('');
}

// re-render "time ago" labels periodically without a full refetch
setInterval(renderList, 30000);

// ── initial load: only currently-active alerts ──
async function loadActive(){
  console.log('[MediHelp Admin] Loading active SOS alerts…');
  const { data, error } = await supabaseClient
    .from('sos_alerts')
    .select('*')
    .eq('status', 'active')
    .order('created_at', { ascending: false });

  if(error){
    console.error('[MediHelp Admin] Failed to load sos_alerts —', error.message, error);
    document.getElementById('alertList').innerHTML = `<div class="empty-state">⚠️ Could not load alerts.<br><small>${error.message}</small></div>`;
    return;
  }

  console.log(`[MediHelp Admin] Loaded ${data.length} active alert(s)`, data);
  data.forEach(row => { alerts[row.id] = row; upsertMarker(row); });
  renderList();

  if(data.length){
    const group = L.featureGroup(Object.values(markers));
    map.fitBounds(group.getBounds().pad(0.3));
  }
}

function subscribeRealtime(){
  supabaseClient
    .channel('sos_alerts_admin')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sos_alerts' }, payload => {
      console.log('[MediHelp Admin] Realtime INSERT received', payload.new);
      const row = payload.new;
      if(row.status === 'active'){
        alerts[row.id] = row;
        upsertMarker(row);
        renderList();
        map.panTo([row.lat, row.lng], { animate: true }); // gently pan so a new alert is never missed
      }
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'sos_alerts' }, payload => {
      console.log('[MediHelp Admin] Realtime UPDATE received', payload.new);
      const row = payload.new;
      if(row.status === 'active'){
        alerts[row.id] = row;
        upsertMarker(row);
      } else {
        delete alerts[row.id]; // resolved / cancelled → drop from the live view
        removeMarker(row.id);
      }
      renderList();
    })
    .subscribe((status) => {
      console.log('[MediHelp Admin] Realtime channel status:', status);
      if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
        console.error('[MediHelp Admin] Realtime subscription failed — check that Realtime is enabled for sos_alerts (Database → Replication) and that sos_alerts_migration.sql ran successfully.');
      }
    });
}

// ── Boot sequence ────────────────────────────────────────────────────────────
// Critical fix: supabase-js restores a saved login session from storage
// ASYNCHRONOUSLY. Querying immediately on page load — before that finishes —
// sends the request with no auth token attached, so RLS (is_admin()) silently
// filters everything out, and it looked exactly like "no data" even though
// writes were succeeding. Waiting for getSession() first fixes both the
// initial load AND the realtime subscription.
(async function init(){
  const { data: { session } } = await supabaseClient.auth.getSession();
  if(!session){
    document.getElementById('alertList').innerHTML =
      '<div class="empty-state">🔒 Please log in to the admin dashboard first, then reopen this page.</div>';
    document.getElementById('liveCount').textContent = '–';
    console.warn('[MediHelp Admin] No active Supabase Auth session — sos_alerts reads/writes will be rejected by RLS.');
    return;
  }
  console.log('[MediHelp Admin] Signed in as', session.user.email);
  await loadActive();
  subscribeRealtime();
})();
</script>
</body>
</html>
