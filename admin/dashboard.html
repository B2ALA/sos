<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · MediHelp Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../css/admin.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body class="admin-body">

  <div id="admin-gate" class="admin-gate">
    <svg class="pulse-line pulse-draw" viewBox="0 0 240 28"><path d="M0 14 H80 L92 2 L104 26 L116 14 H240"/></svg>
    <p>Checking access…</p>
  </div>

  <div class="admin-shell">
    <div id="sidebar-slot"></div>
    <div>
      <div id="topbar-slot"></div>
      <main class="admin-main">
        <div class="admin-page-head">
          <div>
            <h2>Dashboard Overview</h2>
            <p>Live snapshot of MediHelp's emergency response network.</p>
          </div>
          <button class="btn btn-outline" id="refresh-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></svg>
            Refresh
          </button>
        </div>

        <section class="stat-grid" id="stat-grid" aria-label="Key metrics">
          <!-- stat cards injected by dashboard.js -->
        </section>

        <section class="panel-grid">
          <div class="panel card">
            <h3>Emergency Trends</h3>
            <p class="panel-sub">SOS alerts vs. resolved cases, last 7 days</p>
            <div class="chart-box"><canvas id="trendChart"></canvas></div>
          </div>
          <div class="panel card">
            <h3>Requests by Category</h3>
            <p class="panel-sub">Today's distribution</p>
            <div class="chart-box"><canvas id="categoryChart"></canvas></div>
          </div>
        </section>

        <section class="panel card" style="padding: var(--space-5);">
          <h3>Recent Activity</h3>
          <p class="panel-sub">Latest events across the platform</p>
          <div class="data-table-wrap">
            <table class="data-table" id="activity-table">
              <thead><tr><th>Event</th><th>Detail</th><th>Time</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/admin-auth-guard.js"></script>
  <script src="../js/admin-common.js"></script>
  <script>renderAdminShell('dashboard', 'Dashboard');</script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
