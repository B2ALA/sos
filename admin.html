<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MediHelp Admin</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <div class="nav-left">
        <a class="logo" href="index.html"><div class="logo-mark">⚕️</div><div class="logo-text">Medi<span>Help</span></div></a>
        <div style="font-weight:800;margin-left:12px">Admin Portal</div>
      </div>
      <div class="nav-right">
        <button class="nav-cta" onclick="adminLogout()">Logout</button>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="section-head">
      <div>
        <div class="sec-eyebrow">Admin</div>
        <div class="sec-title">Dashboard</div>
        <div class="sec-sub">Manage doctors, hospitals, volunteers, donors and view emergency requests.</div>
      </div>
      <div>
        <button class="btn-full btn-brand" onclick="showAddDoctor()">+ Add Doctor</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 360px;gap:18px">
      <div>
        <h4>Doctors</h4>
        <div id="adminDoctors"></div>

        <h4 style="margin-top:18px">Hospitals</h4>
        <div id="adminHospitals"></div>
      </div>

      <aside>
        <div style="background:var(--surface);padding:12px;border-radius:12px;box-shadow:var(--shadow)">
          <h4>Stats</h4>
          <div id="adminStats"></div>
        </div>

        <div style="margin-top:12px;background:var(--surface);padding:12px;border-radius:12px;box-shadow:var(--shadow)">
          <h4>Emergency Requests</h4>
          <div id="adminEmergencies"></div>
        </div>
      </aside>
    </div>
  </section>

  <div id="adminModals"></div>

  <script>
    // Simple admin auth (demo)
    function adminLogout(){ localStorage.removeItem('medi_admin'); window.location.href='index.html'; }

    function loadAdminData(){
      const doctors = JSON.parse(localStorage.getItem('medi_doctors') || '[]');
      const hospitals = JSON.parse(localStorage.getItem('medi_hospitals') || '[]');
      const emerg = JSON.parse(localStorage.getItem('medi_emergencies') || '[]');
      document.getElementById('adminDoctors').innerHTML = doctors.map(d => `<div class="svc-card"><div style="display:flex;justify-content:space-between"><strong>${d.name}</strong><span>${d.specialization}</span></div><div style="margin-top:8px">${d.hospital || ''} · ${d.contact || ''}</div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn-full btn-brand" onclick="editDoctor('${d.id}')">Edit</button><button class="btn-full btn-grey" onclick="deleteDoctor('${d.id}')">Delete</button></div></div>`).join('') || '<p style="color:var(--muted)">No doctors</p>';
      document.getElementById('adminHospitals').innerHTML = hospitals.map(h => `<div class="svc-card"><div style="display:flex;justify-content:space-between"><strong>${h.name}</strong><span>${h.city || ''}</span></div><div style="margin-top:8px">Beds: ${h.beds || 0} · ICU: ${h.icu || 0}</div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn-full btn-brand" onclick="editHospital('${h.id}')">Edit</button><button class="btn-full btn-grey" onclick="deleteHospital('${h.id}')">Delete</button></div></div>`).join('') || '<p style="color:var(--muted)">No hospitals</p>';
      document.getElementById('adminEmergencies').innerHTML = emerg.map(e => `<div style="padding:8px;border-radius:8px;border:1px solid rgba(0,0,0,.04);margin-bottom:8px"><strong>${e.id}</strong><div style="color:var(--muted)">${new Date(e.time).toLocaleString()}</div><div style="margin-top:6px">Status: ${e.status}</div></div>`).join('') || '<p style="color:var(--muted)">No emergencies</p>';
      document.getElementById('adminStats').innerHTML = `<div>Doctors: ${doctors.length}</div><div>Hospitals: ${hospitals.length}</div><div>Emergencies: ${emerg.length}</div>`;
    }

    // CRUD functions (demo)
    function showAddDoctor(){
      const id = 'addDoc';
      const html = `<div class="mbox"><div class="mhead"><h3>Add Doctor</h3><button onclick="closeAdminModal('${id}')">✕</button></div><div class="mbody">
        <input id="ad_name" class="m-input" placeholder="Name" />
        <input id="ad_spec" class="m-input" placeholder="Specialization" />
        <input id="ad_hosp" class="m-input" placeholder="Hospital" />
        <input id="ad_contact" class="m-input" placeholder="Contact" />
        <div style="display:flex;gap:8px"><button class="btn-full btn-brand" onclick="addDoctor()">Save</button><button class="btn-full btn-grey" onclick="closeAdminModal('${id}')">Cancel</button></div>
      </div></div>`;
      const container = document.getElementById('adminModals');
      container.innerHTML = `<div id="${id}" class="backdrop on">${html}</div>`;
    }
    function closeAdminModal(id){ const el = document.getElementById(id); if (el) el.remove(); }
    function addDoctor(){
      const doctors = JSON.parse(localStorage.getItem('medi_doctors') || '[]');
      const d = { id: 'D'+Date.now(), name: document.getElementById('ad_name').value, specialization: document.getElementById('ad_spec').value, hospital: document.getElementById('ad_hosp').value, contact: document.getElementById('ad_contact').value };
      doctors.unshift(d);
      localStorage.setItem('medi_doctors', JSON.stringify(doctors));
      closeAdminModal('addDoc');
      loadAdminData();
      alert('Doctor added (demo)');
    }
    function editDoctor(id){ alert('Edit doctor (demo)'); }
    function deleteDoctor(id){ if(confirm('Delete doctor?')){ let doctors = JSON.parse(localStorage.getItem('medi_doctors')||'[]'); doctors = doctors.filter(d=>d.id!==id); localStorage.setItem('medi_doctors', JSON.stringify(doctors)); loadAdminData(); } }

    function editHospital(id){ alert('Edit hospital (demo)'); }
    function deleteHospital(id){ if(confirm('Delete hospital?')){ let hospitals = JSON.parse(localStorage.getItem('medi_hospitals')||'[]'); hospitals = hospitals.filter(h=>h.id!==id); localStorage.setItem('medi_hospitals', JSON.stringify(hospitals)); loadAdminData(); } }

    // init
    window.addEventListener('load', () => {
      // simple admin login check (demo)
      const admin = localStorage.getItem('medi_admin');
      if (!admin) {
        const pw = prompt('Enter admin password (demo):');
        if (pw !== 'admin123') { alert('Unauthorized'); window.location.href='index.html'; return; }
        localStorage.setItem('medi_admin', 'true');
      }
      loadAdminData();
    });
  </script>
</body>
</html>
