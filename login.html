<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — MediHelp</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <h2>Login</h2>
    <form id="loginForm">
      <label> Email <input id="loginEmail" type="email" required /></label>
      <label> Password <input id="loginPass" type="password" required /></label>
      <div class="auth-actions">
        <button type="submit" class="btn primary">Login</button>
        <a href="register.html" class="btn ghost">Register</a>
      </div>
    </form>
    <div id="loginMsg" class="muted"></div>
  </main>

  <script>
    // Simple demo auth using localStorage
    document.getElementById('loginForm').addEventListener('submit', e=>{
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      const users = JSON.parse(localStorage.getItem('mh_users')||'[]');
      const user = users.find(u=>u.email===email && u.password===pass);
      if(user){
        localStorage.setItem('mh_current', JSON.stringify(user));
        window.location.href = 'profile.html';
      } else {
        document.getElementById('loginMsg').textContent = 'Invalid credentials. Use register to create an account.';
      }
    });
  </script>
</body>
</html>
