<!doctype html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Login — MediHelp</title><link rel="stylesheet" href="css/styles.css" /></head>
<body>
  <section class="section" style="max-width:420px;margin:40px auto">
    <div style="background:var(--surface);padding:18px;border-radius:12px;box-shadow:var(--shadow)">
      <h2>Login</h2>
      <input id="loginEmail" class="m-input" placeholder="Email" />
      <input id="loginPass" type="password" class="m-input" placeholder="Password" />
      <div style="display:flex;gap:8px">
        <button class="btn-full btn-brand" onclick="doLogin()">Login</button>
        <a class="btn-full btn-grey" href="register.html">Register</a>
      </div>
    </div>
  </section>

  <script>
    function doLogin(){
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      const users = JSON.parse(localStorage.getItem('medi_users') || '[]');
      const u = users.find(x => x.email === email && x.password === pass);
      if (!u) { alert('Invalid credentials'); return; }
      localStorage.setItem('medi_user', JSON.stringify(u));
      window.location.href = 'profile.html';
    }
  </script>
</body>
</html>
