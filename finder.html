<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MediHelp - Locator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="top-nav">
    <a href="index.html">🚨 SOS</a>
    <a href="chatbot.html">🤖 Chatbot</a>
    <a href="finder.html" class="active">📍 Finder</a>
    <a href="register.html">📝 Register</a>
    <a href="login.html">🔑 Login</a>
  </nav>

  <div class="container">
    <header class="app-header">
      <h1>📍 Find Help Nearby</h1>
      <p id="locStatus" style="color:var(--muted); font-size:13px;">Getting your location...</p>
    </header>

    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="doctors">🩺 Doctors</button>
      <button class="tab-btn" data-tab="pharmacies">💊 Pharmacies</button>
      <button class="tab-btn" data-tab="donors">🩸 Blood Donors</button>
      <button class="tab-btn" data-tab="shelters">🏫 Shelters</button>
    </div>

    <!-- Filters (shown/hidden per tab) -->
    <div class="form-section" id="filters"></div>

    <div id="map"></div>

    <div id="results"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="finder.js"></script>
