<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Health Assistant — MediHelp</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  .chat-shell { max-width: 780px; margin: 0 auto; display:flex; flex-direction:column; height: calc(100vh - 76px); }
  .chat-window { flex:1; overflow-y:auto; padding: 20px 4px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width: 78%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height:1.5; }
  .msg.bot { background: var(--surface); border:1px solid var(--border); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg.user { background: var(--teal); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .msg.emergency { border-left: 4px solid var(--alert); }
  .typing-dots span { display:inline-block; width:6px; height:6px; background:var(--ink-soft); border-radius:50%; margin-right:3px; animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2){animation-delay:0.15s;} .typing-dots span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-5px);} }
  .quick-replies { display:flex; gap:8px; flex-wrap:wrap; padding: 6px 4px 14px; }
  .quick-reply { background:var(--teal-soft); color:var(--teal-deep); border:none; border-radius:999px; padding:8px 14px; font-size:0.82rem; cursor:pointer; }
  .quick-reply:hover { background: var(--teal); color:#fff; }
  .chat-input-bar { display:flex; gap:8px; padding: 12px 4px 20px; border-top:1px solid var(--border); }
  .chat-input-bar input { flex:1; padding:14px 16px; border-radius:999px; border:1.5px solid var(--border); background:var(--surface); color:var(--ink); font-size:0.95rem; }
  .icon-btn { width:48px; height:48px; border-radius:50%; border:none; background:var(--surface-2); color:var(--ink); cursor:pointer; font-size:1.05rem; flex-shrink:0; }
  .icon-btn.active { background: var(--alert); color:#fff; }
  .icon-btn.send { background: var(--teal); color:#fff; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand"><span class="pulse-dot"></span> MediHelp</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="doctors.html">Doctors</a></li>
      <li><a href="sos.html" class="nav-cta">SOS</a></li>
    </ul>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"><i class="fa-solid fa-circle-half-stroke"></i></button>
  </div>
</nav>

<div class="container">
  <div class="chat-shell">
    <div style="padding:16px 4px 0;">
      <span class="eyebrow">AI Health Assistant</span>
      <h2 style="margin-top:6px;">Ask about symptoms, first aid, or emergencies</h2>
      <p style="font-size:0.85rem;">This assistant gives general guidance only and is not a substitute for professional medical care. For life-threatening emergencies, use the SOS button.</p>
    </div>

    <div class="chat-window" id="chat-window"></div>
    <div class="quick-replies" id="quick-replies"></div>

    <div class="chat-input-bar">
      <button class="icon-btn" id="mic-btn" aria-label="Voice input"><i class="fa-solid fa-microphone"></i></button>
      <input type="text" id="chat-input" placeholder="Type your question, e.g. 'signs of a heart attack'..." autocomplete="off">
      <button class="icon-btn send" id="send-btn" aria-label="Send"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script>
const chatWindow = document.getElementById("chat-window");
const chatInput = document.getElementById("chat-input");
const quickRepliesEl = document.getElementById("quick-replies");

function addMessage(text, sender, isEmergency = false) {
  const div = document.createElement("div");
  div.className = `msg ${sender}` + (isEmergency ? " emergency" : "");
  div.textContent = text;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return div;
}

function addTypingIndicator() {
  const div = document.createElement("div");
  div.className = "msg bot typing-dots";
  div.id = "typing-indicator";
  div.innerHTML = "<span></span><span></span><span></span>";
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}
function removeTypingIndicator() { document.getElementById("typing-indicator")?.remove(); }

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1;
  speechSynthesis.speak(utter);
}

async function sendMessage(text) {
  if (!text.trim()) return;
  addMessage(text, "user");
  chatInput.value = "";
  addTypingIndicator();
  try {
    const res = await MediHelpAPI.post("/chatbot/message", { message: text }, MediHelpAuth.isLoggedIn());
    await new Promise((r) => setTimeout(r, 400)); // natural typing pause
    removeTypingIndicator();
    addMessage(res.answer, "bot", res.isEmergency);
    speak(res.answer);
    if (res.isEmergency) {
      showToast("This sounds urgent — consider using SOS if it's happening now.", "error");
    }
  } catch (err) {
    removeTypingIndicator();
    addMessage("Sorry, I couldn't reach the assistant right now. Please check your connection or try again.", "bot");
  }
}

async function loadSuggestions() {
  try {
    const res = await MediHelpAPI.get("/chatbot/suggestions");
    quickRepliesEl.innerHTML = "";
    res.suggestions.forEach((s) => {
      const btn = document.createElement("button");
      btn.className = "quick-reply";
      btn.textContent = s.question;
      btn.onclick = () => sendMessage(s.question);
      quickRepliesEl.appendChild(btn);
    });
  } catch (e) { /* backend not configured yet — quick replies stay empty */ }
}

document.getElementById("send-btn").addEventListener("click", () => sendMessage(chatInput.value));
chatInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(chatInput.value); });

// Voice input via Web Speech API (browser-dependent; gracefully degrades)
const micBtn = document.getElementById("mic-btn");
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.onstart = () => micBtn.classList.add("active");
  recognition.onend = () => micBtn.classList.remove("active");
  recognition.onresult = (e) => { chatInput.value = e.results[0][0].transcript; sendMessage(chatInput.value); };
  micBtn.addEventListener("click", () => recognition.start());
} else {
  micBtn.addEventListener("click", () => showToast("Voice input isn't supported in this browser."));
}

addMessage("Hi, I'm your MediHelp AI assistant. Tell me your symptoms or ask about an emergency, and I'll do my best to help.", "bot");
loadSuggestions();
</script>
</body>
</html>
