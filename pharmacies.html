<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Directory — MediHelp</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand"><span class="pulse-dot"></span> MediHelp</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="doctors.html">Doctors</a></li>
      <li><a href="sos.html" class="nav-cta">SOS</a></li>
    </ul>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"><i class="fa-solid fa-circle-half-stroke"></i></button>
  </div>
</nav>

<section class="section">
  <div class="container">
    <span class="eyebrow">Salem, Tamil Nadu</span>
    <h1>Find a pharmacy</h1>

    <div class="card" style="margin-bottom:26px;">
      <div class="form-grid">
        <div class="field"><label>Name or area</label><input type="text" id="filter-name" placeholder="e.g. Sri Medicals, Fairlands"></div>
        <div class="field">
          <label>Hours</label>
          <select id="filter-24hr"><option value="">All</option><option value="true">Open 24 hours only</option></select>
        </div>
      </div>
      <div class="flex gap-12">
        <button class="btn btn-primary" id="search-btn">Search</button>
        <button class="btn btn-outline" id="near-me-btn"><i class="fa-solid fa-location-crosshairs"></i> Near me</button>
      </div>
    </div>

    <p id="result-count" style="font-size:0.85rem;"></p>
    <div class="grid grid-3" id="results"></div>
  </div>
</section>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script>
let nearMeCoords = null;

function renderPharmacies(list) {
  document.getElementById("result-count").textContent = `${list.length} pharmacies found`;
  document.getElementById("results").innerHTML = list.map((p) => `
    <div class="card card-hover">
      ${p.open_24hrs ? '<span class="badge badge-gold">Open 24 hours</span>' : '<span class="badge">Regular hours</span>'}
      <h3 style="margin-top:12px; font-size:1.1rem;">${p.name}</h3>
      <p style="margin:0 0 4px;"><i class="fa-solid fa-location-dot"></i> ${p.address}${p.distanceKm != null ? ` · ${p.distanceKm} km away` : ""}</p>
      <p style="margin:0 0 10px;"><i class="fa-solid fa-star" style="color:var(--gold);"></i> ${p.rating}</p>
      <a class="btn btn-primary btn-block" href="tel:${p.phone}"><i class="fa-solid fa-phone"></i> Call ${p.phone}</a>
    </div>
  `).join("") || "<p>No pharmacies matched your search.</p>";
}

async function loadPharmacies() {
  const name = document.getElementById("filter-name").value;
  const open24 = document.getElementById("filter-24hr").value;
  const params = new URLSearchParams();
  if (name) params.set("name", name);
  if (nearMeCoords) { params.set("lat", nearMeCoords.latitude); params.set("lng", nearMeCoords.longitude); }

  try {
    const res = await MediHelpAPI.get(`/pharmacies?${params.toString()}`);
    let data = res.data;
    if (open24 === "true") data = data.filter((p) => p.open_24hrs);
    renderPharmacies(data);
  } catch (err) {
    document.getElementById("results").innerHTML = `<p>Couldn't load pharmacies right now. ${err.message}</p>`;
  }
}

document.getElementById("search-btn").onclick = loadPharmacies;
document.getElementById("near-me-btn").onclick = async () => {
  try {
    nearMeCoords = await getCurrentPosition();
    showToast("Sorting by distance from you.");
    loadPharmacies();
  } catch (e) { showToast("Couldn't access your location.", "error"); }
};

loadPharmacies();
</script>
</body>
</html>
