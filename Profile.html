<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — MediHelp</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <a href="index.html" class="brand" style="text-decoration:none;"><span class="pulse-dot"></span> MediHelp 🩺</a>
  <button class="btn btn-ghost btn-sm" onclick="logoutUser()">🚪 Logout</button>
</header>

<div class="shell" style="max-width:640px;">
  <h2 class="section-title">👤 My Profile</h2>
  <div id="profileView"></div>

  <h2 class="section-title">✏️ Edit Details</h2>
  <div class="card">
    <form id="editForm" onsubmit="saveProfileEdits(event)">
      <div class="form-grid">
        <div><label>Full Name</label><input type="text" id="edit_fullName"></div>
        <div><label>Age</label><input type="number" id="edit_age"></div>
        <div><label>Gender</label><input type="text" id="edit_gender"></div>
        <div><label>Mobile Number</label><input type="tel" id="edit_mobile"></div>
        <div><label>Emergency Contact</label><input type="tel" id="edit_emergencyContact"></div>
        <div><label>District</label><input type="text" id="edit_district"></div>
        <div><label>State</label><input type="text" id="edit_state"></div>
      </div>
      <label>Address</label><input type="text" id="edit_address">
      <label>Medical Conditions</label><textarea id="edit_conditions" rows="2"></textarea>
      <label>Allergies</label><textarea id="edit_allergies" rows="2"></textarea>
      <label>Current Medications</label><textarea id="edit_medications" rows="2"></textarea>
      <label>Insurance Details</label><input type="text" id="edit_insurance">
      <label class="flex gap-8" style="align-items:center;margin-top:12px;"><input type="checkbox" id="edit_organDonor" style="width:auto;"> 🫀 Organ Donor</label>
      <button class="btn btn-primary btn-block" style="margin-top:18px;" type="submit">💾 Save Changes</button>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="js/data.js"></script>
<script>
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
<script src="js/auth.js"></script>
<script>
requireLogin();
const u = currentUser();
if(u){
  document.getElementById('profileView').innerHTML = `
    <div class="card">
      <div class="card-row">
        <div>
          <div style="font-weight:700;font-size:16px;">${u.fullName}</div>
          <div class="muted small">${u.email} · ${u.mobile}</div>
        </div>
        <span class="badge alert">🩸 ${u.blood}</span>
      </div>
      <div style="margin-top:10px;" class="small">📍 ${u.address}, ${u.district}, ${u.state}</div>
      <div class="small">🆘 Emergency Contact: ${u.emergencyContact}</div>
      <div class="small">⚕️ Conditions: ${u.conditions || 'None listed'}</div>
      <div class="small">⚠️ Allergies: ${u.allergies || 'None listed'}</div>
      <div class="small">🫀 Organ Donor: ${u.organDonor ? 'Yes' : 'No'}</div>
    </div>`;
  ['fullName','age','gender','mobile','emergencyContact','address','district','state','conditions','allergies','medications','insurance'].forEach(f=>{
    const el = document.getElementById('edit_'+f);
    if(el) el.value = u[f] || '';
  });
  document.getElementById('edit_organDonor').checked = !!u.organDonor;
}
</script>
</body>
</html>
